<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="description" content="HealthEDI Analyzer - AI Powered Healthcare EDI Analysis Platform for parsing, validating, and analyzing X12 EDI healthcare transactions." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthEDI Analyzer - AI Powered Healthcare EDI Analysis Platform</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body
    class="font-sans antialiased text-gray-900 bg-slate-50 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300 relative min-h-screen flex overflow-y-auto overflow-x-hidden">
    <div id="app" class="flex w-full h-full"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
